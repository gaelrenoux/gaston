    min-persons-col = 3
    max-persons-col = 4
    topic-occurrences-col = 5
    persons-count-add = 0
    persons-start-col = 10
    forbidden-person-marker = 0
  }

  slots = [
    [
      {name = "1 - jeudi aprèm"},
      {name = "2 - jeudi soir"}
    ],[
      {name = "3 - vendredi aprèm"},
      {name = "4 - vendredi soir"}
    ],[
      {name = "5 - samedi aprèm"},
      {name = "6 - samedi soir"}
    ]
  ]

  topics = []

  persons = []

  constraints {
    exclusive = []
    limited-count = []
    linked = []
    not-simultaneous = []
    simultaneous = []
  }

}
